<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Travel Planner — Let's Explore!</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #0d1117; --paper: #faf8f4; --sand: #f0ebe1; --ocean: #1a3a5c;
    --ocean-dark: #0f2340; --ocean-mid: #2a5580; --coral: #e8633a;
    --coral-light: #fdf0eb; --gold: #c9a44a; --muted: #6b7280; --border: #e5e0d8; --white: #ffffff;
    --success: #2d6647; --success-bg: #e8f5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; position: relative; }
  nav { background: var(--ocean-dark); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight:600; font-family: 'Fraunces', serif; }
  .main { max-width: 780px; margin: 40px auto; padding: 0 16px; }
  .card { background: var(--white); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid var(--border); }
  .progress-bar { height: 4px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--coral); transition: width 0.4s ease; width: 14%; }
  
  .step-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--sand); overflow-x: auto; }
  .step-tab { 
    flex: 1; 
    padding: 16px 12px; 
    text-align: center; 
    font-size: 14px; 
    font-weight: 600; 
    color: var(--muted); 
    cursor: default; 
    white-space: nowrap; 
    letter-spacing: -0.01em;
  }
  .step-tab.active { color: var(--ocean); background: var(--white); font-weight: 700; border-bottom: 3px solid var(--coral); }
  
  .step-panel { display: none; padding: 28px 24px; }
  .step-panel.active { display: block; }
  .step-heading { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--ocean-dark); margin-bottom: 4px; }
  .step-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ocean-dark); margin-bottom: 5px; text-transform: uppercase; }
  input[type="text"], input[type="date"], input[type="time"], input[type="number"], input[type="email"], input[type="password"], select, textarea {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: white;
  }
  .form-row { display: flex; gap: 16px; margin-bottom: 18px; }
  .form-row .form-group { flex: 1; margin-bottom: 0; }
  .form-group { margin-bottom: 18px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; background: white; }
  .chip.selected { border-color: var(--coral); color: var(--coral); background: var(--coral-light); font-weight: 600; }
  .compulsory-feedback-card { background: var(--coral-light); border: 1.5px solid var(--coral); border-radius: 14px; padding: 16px; margin: 20px 24px 24px; }
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn { padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
  .btn-primary { background: var(--coral); color: white; flex: 1; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .error-box { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 10px; padding: 12px 16px; margin-top: 14px; display: none; font-size: 13px; color: #991b1b; }
  .error-box.show { display: block; }
  .daily-card { background: var(--white); border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 16px; }
  .vibe-checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
  .vibe-checkbox-label { font-size: 13px; display: flex; align-items: center; gap: 4px; background: var(--paper); padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
  
  /* SLEEK LINK OPTIONS FOOTPRINT - Lettering shrunk to dynamic size like IRCTC portal sizes */
  .live-helper-link { 
    color: var(--white) !important; font-weight: 600; text-decoration: none; 
    background: var(--coral); padding: 5px 10px !important; border-radius: 6px; 
    border: 1px solid var(--coral); font-size: 12px !important; display: inline-flex; 
    align-items: center; gap: 4px; transition: all 0.2s ease-in-out;
    box-shadow: 0 2px 4px rgba(232, 99, 58, 0.1); text-transform: none;
  }
  .live-helper-link:hover { background: var(--ocean); border-color: var(--ocean); color: var(--white) !important; transform: translateY(-1px); }

  .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,17,23,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; }
  .auth-modal { background: white; border-radius: 20px; max-width: 400px; width: 90%; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  .auth-toggle-link { color: var(--coral); font-weight: 600; cursor: pointer; text-decoration: underline; font-size: 13px; }

  .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); }
  .auth-tab.active { color: var(--coral); border-bottom: 2px solid var(--coral); }
  
  .discovery-hub { display: flex; flex-direction: column; gap: 8px; background: var(--sand); padding: 12px; border-radius: 8px; margin-top: 8px; }
  .discovery-item { background: var(--white); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
  .discovery-item:hover { border-color: var(--coral); background: var(--coral-light); color: var(--coral); }
  .discovery-tag { font-size: 10px; text-transform: uppercase; background: var(--paper); padding: 2px 6px; border-radius: 4px; font-weight: 600; color: var(--muted); }

  .app-notification-toast {
    position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
    background: var(--ocean-dark); color: white; padding: 14px 24px;
    border-radius: 12px; box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    z-index: 2000; font-size: 14px; font-weight: 500; display: flex;
    align-items: center; gap: 10px; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid var(--ocean-mid); max-width: 90%; width: 500px;
  }
  .app-notification-toast.show { top: 20px; }

  .injection-modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 35, 64, 0.6); backdrop-filter: blur(4px);
    display: none; justify-content: center; align-items: center; z-index: 3000;
  }
  .injection-modal-container {
    background: var(--white); border-radius: 16px; padding: 24px;
    width: 90%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    border: 1px solid var(--border); animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .duration-summary-card {
    background: var(--coral-light); border: 1.5px solid var(--coral); border-radius: 12px;
    padding: 14px 18px; margin-bottom: 18px; display: flex; justify-content: space-around; align-items: center; text-align: center;
  }
  .duration-metric { font-size: 18px; font-weight: 700; color: var(--ocean-dark); }
  .duration-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  
  .stopover-card-block { 
    background: var(--white); border: 1.5px solid var(--border); border-radius: 14px; 
    padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  }
</style>
</head>
<body>

<div id="appNotificationToast" class="app-notification-toast"></div>

<div id="injectionModal" class="injection-modal-overlay">
  <div class="injection-modal-container">
    <h3 style="font-family:'Fraunces', serif; color:var(--ocean-dark); font-size:18px; margin-bottom:8px;">Add Spotlight Item</h3>
    <p id="injectionModalLabel" style="font-size:13.5px; color:var(--muted); margin-bottom:16px;"></p>
    <div class="form-group">
      <label>Target Trip Day Number:</label>
      <input type="number" id="injectionDayInput" min="1" step="1" value="1" style="font-weight: 600;">
    </div>
    <div class="btn-row" style="margin-top: 16px;">
      <button class="btn btn-ghost" onclick="closeInAppModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmInAppModalInjection()" style="background: var(--ocean-mid);">Confirm Addition</button>
    </div>
  </div>
</div>

<nav>
  <a class="nav-brand" href="#">✈️ AI Travel Planner</a>
  <button id="authHeaderBtn" class="btn" style="background: var(--coral); color: white; padding: 6px 16px; font-size: 13px;" onclick="openAuthModal()">🔑 Account Access</button>
</nav>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h3 id="authModalTitle" style="font-family:'Fraunces', serif; font-size:20px; color:var(--ocean-dark);">Account Portal</h3>
      <button style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted);" onclick="closeAuthModal()">×</button>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="authTabSignup" onclick="setAuthInterfaceMode('signup')">Sign Up (New)</div>
      <div class="auth-tab" id="authTabLogin" onclick="setAuthInterfaceMode('login')">Log In (Existing)</div>
    </div>
    
    <div id="authFormContainer">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="authEmail" placeholder="name@example.com">
      </div>
      <div class="form-group" id="passwordGroup">
        <label>Password</label>
        <input type="password" id="authPassword" placeholder="••••••••">
      </div>
      
      <button class="btn btn-primary" id="mainAuthSubmitBtn" style="width:100%; margin-bottom:12px;" onclick="handleCredentialAuth()">Continue</button>
      <button class="btn btn-ghost" style="width:100%; gap:8px; margin-bottom:16px;" onclick="loginWithGoogle()">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="G"> Continue via Google
      </button>
    </div>
    <div class="error-box" id="authErrorMsg" style="margin-top:12px;"></div>
  </div>
</div>

<script>
let currentAuthMode = 'signup';
<div class="main">
  <div class="card">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="step-tabs" id="stepTabs">
      <div class="step-tab active">🗺️ Dest</div>
      <div class="step-tab">👥 Crew</div>
      <div class="step-tab">📅 Dates</div>
      <div class="step-tab">🚗 Transit</div>
      <div class="step-tab">✨ Vibes</div>
      <div class="step-tab">💰 Budget</div>
      <div class="step-tab">🚀 Review</div>
    </div>

    <!-- STEP 1: DESTINATIONS -->
    <div class="step-panel active" id="step1">
      <div class="step-heading">Where are we exploring? 🗺️</div>
      <p class="step-sub">Select your primary travel destination hub below.</p>
      
      <div class="form-group">
        <label>💡 Explore by Travel Theme (Auto-Generates Destination):</label>
        <div class="chips" style="margin-bottom: 12px;">
          <div class="chip" style="border-color:var(--gold); color:var(--ocean-dark);" onclick="selectThematicRandomEngine('mountains')">🏔️ The Himalayas / Mountains</div>
          <div class="chip" style="border-color:var(--gold); color:var(--ocean-dark);" onclick="selectThematicRandomEngine('beaches')">🏖️ Sun-Kissed Beaches</div>
          <div class="chip" style="border-color:var(--gold); color:var(--ocean-dark);" onclick="selectThematicRandomEngine('heritage')">🗿 Historic Heritage Sights</div>
        </div>
      </div>

      <div class="form-group">
        <label>Or Choose Manually:</label>
        <div class="chips" id="destChips">
          <div class="chip" data-val="Coorg, Karnataka">Coorg, KA ☕</div>
          <div class="chip" data-val="Munnar, Kerala">Munnar, KL 🍵</div>
          <div class="chip" data-val="Gokarna, Karnataka">Gokarna, KA 🏖️</div>
          <div class="chip" data-val="Hampi, Karnataka">Hampi, KA 🗿</div>
          <div class="chip" data-val="Spiti Valley, HP">Spiti Valley, HP 🏔️</div>
        </div>
      </div>
      
      <div class="form-group">
        <label>Or enter custom location</label>
        <input type="text" id="customDest" placeholder="e.g. Ooty, Wayanad, Jaipur, Udaipur...">
      </div>
      <div class="form-group">
        <label>Starting Location</label>
        <input type="text" id="startCity" placeholder="e.g. Bangalore">
      </div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(1, 2, 'Destinations Selection')">Next — Companion Crew →</button>
      <div class="error-box" id="err1">Please select at least one destination and fill in your starting location.</div>
    </div>

    <!-- STEP 2: COMPANION CREW -->
    <div class="step-panel" id="step2">
      <div class="step-heading">Who is traveling? 👥</div>
      <p class="step-sub">This determines individual vs. group budget splitting ratios automatically.</p>
      <div class="form-group">
        <label>Select Companion Setup</label>
        <div class="chips" id="crewChips">
          <div class="chip" data-val="Solo">🧍 Solo (Individual Budget)</div>
          <div class="chip" data-val="Couple">💑 Couple (Dual Split)</div>
          <div class="chip" data-val="Friends">👯 Friends Group (Per-Head Split)</div>
          <div class="chip" data-val="Family">👨‍👩‍👧 Family (Consolidated Group Budget)</div>
        </div>
      </div>
      <div class="form-group" id="groupSizeField" style="display:none;">
        <label>Total Number of Travelers</label>
        <input type="number" id="groupSize" min="1" value="1" onchange="state.groupSize = parseInt(this.value) || 1">
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goBack(1)">← Back</button>
        <button class="btn btn-primary" onclick="submitStepAndProgress(2, 3, 'Companion Mapping')">Next — Pick Dates →</button>
      </div>
      <div class="error-box" id="err2">Please select a companion style configuration.</div>
    </div>

    <!-- STEP 3: DATES & TIME CALCULATIONS -->
    <div class="step-panel" id="step3">
      <div class="step-heading">When is the adventure? 📅</div>
      <p class="step-sub">Provide your absolute holiday calendar start and end dates below.</p>
      
      <div class="duration-summary-card" id="durationSummaryCard" style="display: none;">
        <div>
          <div class="duration-metric" id="computedDaysCount">0</div>
          <div class="duration-label">☀️ Days</div>
        </div>
        <div style="border-left: 1px solid var(--border); height: 30px;"></div>
        <div>
          <div class="duration-metric" id="computedNightsCount">0</div>
          <div class="duration-label">🌙 Nights</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Holiday Start Date</label>
          <input type="date" id="startDate" onchange="validateDatesOnly()">
        </div>
        <div class="form-group">
          <label>Holiday Return Date</label>
          <input type="date" id="endDate" onchange="validateDatesOnly()">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Journey Start Time</label>
          <input type="time" id="startTime" value="06:00" onchange="validateDatesOnly()">
        </div>
        <div class="form-group">
          <label>Journey End Time</label>
          <input type="time" id="endTime" value="22:00" onchange="validateDatesOnly()">
        </div>
      </div>
      
      <div class="error-box" id="dateErrorBox">⚠️ Danger: The return date cannot be set chronologically prior to your departure date!</div>
      
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goBack(2)">← Back</button>
        <button class="btn btn-primary" id="btnStep3" onclick="submitStepAndProgress(3, 4, 'Date Setup')">Next — Elaborate Transit Route →</button>
      </div>
      <div class="error-box" id="err3">Please choose valid dates and journey scheduling metrics.</div>
    </div>

    <!-- STEP 4: TRANSIT LOGISTICS & VEHICLE SETTINGS -->
    <div class="step-panel" id="step4">
      <div class="step-heading">Transit & Travel Settings 🚗💨</div>
      <p class="step-sub">Map out your routing sequence and configure transport expenses cleanly.</p>
      
      <!-- SECTION 1: THE BIG LAUNCH -->
      <div style="background: var(--white); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
        <h4 style="font-family:'Fraunces', serif; font-size:16px; color:var(--ocean-dark); margin-bottom:4px;">🎬 Phase 1: The Big Launch (Heading Out)</h4>
        <p style="font-size:12.5px; color:var(--muted); margin-bottom:12px;">Choose how you are departing your hometown to reach the holiday playground.</p>
        <div class="form-group">
          <div class="chips" id="leg1TransportChips">
            <div class="chip" data-val="Flight Connected">✈️ Flying There</div>
            <div class="chip" data-val="Train Connected">🚂 Taking a Train</div>
            <div class="chip" data-val="Bus Connected">🚌 Taking a Bus</div>
            <div class="chip" data-val="Full Road Trip">🚗 Driving All the Way</div>
          </div>
        </div>
        
        <div id="leg1CostDynamicGroup" style="display:none; background: var(--paper); padding: 12px; border-radius: 8px; margin-top: 10px;">
          <div class="form-group" id="leg1FareWrapper" style="display:none;">
            <label id="leg1FareLabel">Ticket Fare per Traveler (INR)</label>
            <input type="number" id="leg1TicketCostInput" value="0" min="0" onchange="runGeographicalDistanceAndSpeedSuggester()">
          </div>
          <div id="leg1FuelWrapper" style="display:none;" class="form-row">
            <div class="form-group">
              <label>Outbound Petrol Price (INR/Litre)</label>
              <input type="number" id="leg1FuelPrice" value="102" min="0" onchange="runGeographicalDistanceAndSpeedSuggester()">
            </div>
            <div class="form-group">
              <label>Vehicle Mileage (KM/Litre)</label>
              <input type="number" id="leg1VehicleMileage" value="15" min="1" onchange="runGeographicalDistanceAndSpeedSuggester()">
            </div>
          </div>
        </div>
      </div>

      <!-- SECTION 2: CHOOSE YOUR PACE -->
      <div style="background: var(--white); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
        <h4 style="font-family:'Fraunces', serif; font-size:16px; color:var(--ocean-dark); margin-bottom:4px;">🏎️ Phase 2: Choose Your Pace</h4>
        <p style="font-size:12.5px; color:var(--muted); margin-bottom:12px;">Are you staying at one main destination, or building a multi-city road trip adventure?</p>
        
        <div class="chips" id="routePaceChips" style="margin-bottom: 14px;">
          <div class="chip selected" data-val="Single Hub" onclick="toggleRouteStyle('Single Hub')">🛋️ Chillin' at One Epic Hub</div>
          <div class="chip" data-val="Multi-City" onclick="toggleRouteStyle('Multi-City')">🚀 Multi-City Road Trip Stopovers</div>
        </div>

        <div id="multiCityBuilderPanel" style="display: none; background: var(--paper); padding: 16px; border-radius: 10px; margin-bottom: 12px;">
          <label style="color: var(--coral); margin-bottom:8px;">📍 Custom Stopover Corridor Scheduler:</label>
          <div id="stopoverRowsContainer"></div>
          <button class="btn btn-ghost" style="padding: 6px 12px; font-size: 12px; margin-top: 6px; background: white;" onclick="addNewStopoverRow()">➕ Add Another Stopover Town</button>
        </div>

        <div style="border-top: 1px dashed var(--border); margin-top: 16px; padding-top: 14px;">
          <label style="color:var(--ocean-dark); font-weight:700; font-size:12px; margin-bottom:6px;">⏱️ Transit Pacing: Flag Pure Road Trip/Travel-Only Days</label>
          <div class="vibe-checkbox-group">
            <label class="vibe-checkbox-label"><input type="checkbox" id="flagDay1TransitCb" checked onchange="runGeographicalDistanceAndSpeedSuggester()"> 🛣️ Day 1 is a pure Travel-Only day (No sights planned)</label>
            <label class="vibe-checkbox-label"><input type="checkbox" id="flagLastDayTransitCb" checked onchange="runGeographicalDistanceAndSpeedSuggester()"> 🏡 Last Day is a pure Travel-Only day (Heading home)</label>
          </div>
        </div>
      </div>

      <!-- SECTION 3: THE ROAMING RHYTHM -->
      <div style="background: var(--white); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
        <h4 style="font-family:'Fraunces', serif; font-size:16px; color:var(--ocean-dark); margin-bottom:4px;">🗺️ Phase 3: The Roaming Rhythm (Exploring Town)</h4>
        <p style="font-size:12.5px; color:var(--muted); margin-bottom:12px;">Select all options you'll use to explore and commute locally within city hubs.</p>
        <div class="form-group">
          <div class="chips" id="leg2TransportChips">
            <div class="chip" data-val="Hired Outstation Cab">🚕 Hired Outstation Cab</div>
            <div class="chip" data-val="Pre-booked Train Link">🚂 Inter-City Rail Link</div>
            <div class="chip" data-val="Private Bus Booking">🚌 Private Buses (Volvo / Sleepers)</div>
            <div class="chip" data-val="Public State Bus">🚏 Public Buses / State KSRTC</div>
            <div class="chip" data-val="Self-Drive Commute">🚗 Local Self-Drive Rental</div>
            <div class="chip" data-val="Local Cabs & Shuttles">❌ Local Cabs & Shuttles Only</div>
          </div>
        </div>

        <div class="form-group" id="leg2CostDynamicGroup" style="display:none; background: var(--paper); padding: 12px; border-radius: 8px;">

function openAuthModal() { document.getElementById('authOverlay').style.display = 'flex'; }
function closeAuthModal() { document.getElementById('authOverlay').style.display = 'none'; }

function setAuthInterfaceMode(mode) {
  currentAuthMode = mode;
  const errMsg = document.getElementById('authErrorMsg');
  errMsg.classList.remove('show');
  
  // Toggle UI Tabs
  document.getElementById('authTabSignup').classList.toggle('active', mode === 'signup');
  document.getElementById('authTabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('authModalTitle').textContent = mode === 'signup' ? "Create Account" : "Log In";
}
function toggleAuthMode() { setAuthInterfaceMode(currentAuthMode === 'signin' ? 'login' : 'signin'); }

  currentAuthMode = 'recovery';

async function loginWithGoogle() {
  const { error } = await travelPlannerSupabaseClient.auth.signInWithOAuth({
    provider: 'google', options: { redirectTo: window.location.origin }
  });
  if (error) {
    const box = document.getElementById('authErrorMsg');
    box.textContent = error.message; box.classList.add('show');
  }
}

async function handleCredentialAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errMsg = document.getElementById('authErrorMsg');
  errMsg.classList.remove('show');

  if (!email || !password) {
    errMsg.textContent = "Please provide both an email and a password.";
    errMsg.classList.add('show');
    return;
  }

  if (currentAuthMode === 'signup') {
    // Attempt Sign Up
    const { data, error } = await travelPlannerSupabaseClient.auth.signUp({ email, password });
    if (error) {
      if (error.message.includes("already registered")) {
        errMsg.textContent = "Email already exists. Please switch to 'Log In' or use Google.";
        errMsg.classList.add('show');
      } else {
        errMsg.textContent = error.message;
        errMsg.classList.add('show');
      }
    } else {
      showAppNotification("Account created! Please check your email to verify.");
      closeAuthModal();
    }
  } else {
    // Attempt Log In
    const { data, error } = await travelPlannerSupabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errMsg.textContent = "Invalid credentials. Please check your email/password.";
      errMsg.classList.add('show');
    } else {
      activeUserToken = data.session.access_token;
      document.getElementById('authHeaderBtn').textContent = `🟢 ${data.user.email}`;
      closeAuthModal();
      showAppNotification("Successfully logged in!");
    }
  }
}

async function runGeographicalDistanceAndSpeedSuggester() {
  syncDynamicCostUIFields(); 
  
  const suggestionBox = document.getElementById('distanceSuggestionBox');
  if (!state.destinations.length || !state.transport) {
    suggestionBox.style.display = 'none'; return;
  }

  suggestionBox.style.display = 'block';
  suggestionBox.innerHTML = `⏳ Figuring out the best route options and mapping distances...`;

  state.leg1TicketCost = parseInt(document.getElementById('leg1TicketCostInput').value) || 0;
  state.leg1FuelPrice = parseInt(document.getElementById('leg1FuelPrice').value) || 102;
  state.leg1VehicleMileage = parseInt(document.getElementById('leg1VehicleMileage').value) || 15;
  
  state.leg2DailyCost = parseInt(document.getElementById('leg2DailyCostInput').value) || 500;
  state.hasLayover = document.getElementById('layoverToggle').checked;
  
  state.leg3TicketCost = parseInt(document.getElementById('leg3TicketCostInput').value) || 0;
  state.leg3FuelPrice = parseInt(document.getElementById('leg3FuelPrice').value) || 102;
  state.leg3VehicleMileage = parseInt(document.getElementById('leg3VehicleMileage').value) || 15;

  const isDay1PureTravel = document.getElementById('flagDay1TransitCb').checked;
  const isLastDayPureTravel = document.getElementById('flagLastDayTransitCb').checked;
  
  let dynamicPaceAllocationSum = 0;
  if (isDay1PureTravel) dynamicPaceAllocationSum += 1;
  if (isLastDayPureTravel) dynamicPaceAllocationSum += 1;
  state.transitDaysAllocation = dynamicPaceAllocationSum;

  try {
    const geocodeUrl = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=`;
    const resStart = await fetch(geocodeUrl + encodeURIComponent(state.startCity));
    const dataStart = await resStart.json();
    
    const finalEndpointCity = state.destinations[0];
    const resFinal = await fetch(geocodeUrl + encodeURIComponent(finalEndpointCity));
    const dataFinal = await resFinal.json();
    
    let finalCalculatedKM = 450;
    let exactDrivingHours = 9;
    let formattedMinutes = 15;

    if (dataStart.length && dataFinal.length) {
      const startPoint = `${dataStart[0].lon},${dataStart[0].lat}`;
      const finalPoint = `${dataFinal[0].lon},${dataFinal[0].lat}`;
      
      const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${startPoint};${finalPoint}?overview=false`;
      const osrmRes = await fetch(osrmUrl);
      const osrmData = await osrmRes.json();
      
      if (osrmData.routes && osrmData.routes.length) {
        const networkRoute = osrmData.routes[0];
        finalCalculatedKM = Math.round(networkRoute.distance / 1000);
        exactDrivingHours = Math.round(networkRoute.duration / 3600);
        formattedMinutes = Math.round((networkRoute.duration % 3600) / 60);
      }
    }
    
    let routeSummaryLabel = 'Single Base Hub';
    if (state.routeStyle === 'Multi-City' && state.stopoverCities.length > 0) {
      finalCalculatedKM += (state.stopoverCities.length * 115); 
      exactDrivingHours += (state.stopoverCities.length * 2);
      
      let stopNamesList = state.stopoverCities.map(c => `${c.cityName} (${c.shiftTime.split(' ')[0]})`);
      routeSummaryLabel = `Stopovers Active [${stopNamesList.join(' ➔ ')}]`;
    }

    state.calculatedDistanceKM = finalCalculatedKM;
    
    let outboundCostPerHead = (state.transport === 'Full Road Trip' || state.transport.includes('Drive')) ? Math.round((finalCalculatedKM / state.leg1VehicleMileage) * state.leg1FuelPrice / state.groupSize) : state.leg1TicketCost;
    let returnCostPerHead = (state.leg3Transport === 'Drive Return' || state.leg3Transport.includes('Drive')) ? Math.round((finalCalculatedKM / state.leg3VehicleMileage) * state.leg3FuelPrice / state.groupSize) : state.leg3TicketCost;
    let totalLocalCommuteCostPerHead = Math.round((state.leg2DailyCost * (state.days || 1)) / state.groupSize);
    let cumulativeTransitSpend = outboundCostPerHead + returnCostPerHead + totalLocalCommuteCostPerHead;
    
    let localOptionsDisplay = state.leg2Transport.length > 0 ? state.leg2Transport.join(", ") : "None chosen";
    
    suggestionBox.innerHTML = `
      🗺️ <strong>Total Map Distance:</strong> ~${finalCalculatedKM} KM total loop route mapping.<br>
      🏎️ <strong>Route Strategy:</strong> ${routeSummaryLabel}<br>
      🎬 <strong>The Big Launch (Outbound):</strong> ${state.transport}<br>
      🗺️ <strong>The Roaming Rhythm (Local Sights):</strong> ${localOptionsDisplay}<br>
      🏡 <strong>The Homeward Cruise (Coming Home):</strong> From ${state.homewardStartCity || finalEndpointCity} via ${state.leg3Transport}<br>
      ⏱️ <strong>Estimated Continuous Travel Time:</strong> ~${exactDrivingHours}h ${formattedMinutes}m ${state.hasLayover ? '( Layover buffer incorporated)' : ''}.<br>
      💵 <strong>Estimated Expenses Metrics (Per Head):</strong> Launch: ₹${outboundCostPerHead} | Cruise: ₹${returnCostPerHead} | Local Transfers: ₹${totalLocalCommuteCostPerHead}<br>
      💰 <strong>Total Route Budget Pool Baseline:</strong> <span style="color:var(--coral); font-weight:700;">₹${cumulativeTransitSpend.toLocaleString('en-IN')} INR per traveler</span>.<br>
      💡 <strong>Our Pacing:</strong> Calculated cleanly using your travel day checkboxes below.
    `;

  } catch (apiError) {
    console.warn("API map fallback sequence run.", apiError);
    suggestionBox.innerHTML = `🏁 <strong>Transit Map Configuration Loop resolved safely.</strong>`;
  }
}

async function queryInAppRealtimeDistance(dateKey) {
  const startLoc = document.getElementById(`local-route-start-${dateKey}`).value.trim();
  const endLoc = document.getElementById(`local-route-end-${dateKey}`).value.trim();
  const feedbackNode = document.getElementById(`local-route-result-${dateKey}`);
  
  if(!startLoc || !endLoc) {
    feedbackNode.innerHTML = `<span style="color:red;">⚠️ Please enter both starting and ending spots to compute metric channels.</span>`;
    return;
  }
  
  feedbackNode.innerHTML = `⏳ Checking OpenStreetMap vector corridors...`;
  
  try {
    const geocodeBase = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=`;
    const resA = await fetch(geocodeBase + encodeURIComponent(startLoc));
    const dataA = await resA.json();
    const resB = await fetch(geocodeBase + encodeURIComponent(endLoc));
    const dataB = await resB.json();
    
    if(dataA.length && dataB.length) {
      const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${dataA[0].lon},${dataA[0].lat};${dataB[0].lon},${dataB[0].lat}?overview=false`;
      const osrmRes = await fetch(osrmUrl);
      const osrmData = await osrmRes.json();
      
      if (osrmData.routes && osrmData.routes.length) {
        const routeData = osrmData.routes[0];
        const distanceKM = (routeData.distance / 1000).toFixed(1);
        const durationMins = Math.round(routeData.duration / 60);
        
        feedbackNode.innerHTML = `
          <div style="background:var(--success-bg); color:var(--success); padding:8px; border-radius:6px; font-size:13px; margin-top:8px; border-left:3px solid var(--success);">
            🏁 <strong>In-App Distance Matrix:</strong> ~${distanceKM} KM | ⏱️ <strong>Drive Duration:</strong> ~${durationMins} mins<br>
            <a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(startLoc)}&destination=${encodeURIComponent(endLoc)}&travelmode=driving" target="_blank" style="color:var(--ocean); font-weight:600; text-decoration:underline; font-size:12px; display:inline-block; margin-top:4px;">🗺️ View Complete Map Track & Live Layovers</a>
          </div>
        `;
        return;
      }
    }
    throw new Error("Coordinates mismatch.");
  } catch(e) {
    feedbackNode.innerHTML = `<span style="color:var(--muted); font-size:12.5px;">🏁 Fallback: <a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(startLoc)}&destination=${encodeURIComponent(endLoc)}" target="_blank" style="text-decoration:underline; font-weight:600; color:var(--coral);">Launch free external directional routing loops on Google Maps</a></span>`;
  }
}

function validateDatesOnly() {
  const startVal = document.getElementById('startDate').value;
  const endVal = document.getElementById('endDate').value;
  const startTimeVal = document.getElementById('startTime').value;
  const endTimeVal = document.getElementById('endTime').value;
  
  const errBox = document.getElementById('dateErrorBox');
  const nextBtn = document.getElementById('btnStep3');
  const durationCard = document.getElementById('durationSummaryCard');

  if (errBox) errBox.classList.remove('show');
  if (nextBtn) { nextBtn.disabled = false; nextBtn.style.opacity = '1'; }
  
  state.startDate = startVal; 
  state.endDate = endVal;
  state.startTime = startTimeVal;
  state.endTime = endTimeVal;

  if (startVal && endVal) {
    const s = new Date(startVal), e = new Date(endVal);
    if (isNaN(s.getTime()) || isNaN(e.getTime())) { 
      if(nextBtn) { nextBtn.disabled = true; nextBtn.style.opacity = '0.4'; } 
      durationCard.style.display = 'none';
      return false; 
    }
    if (e < s) { 
      if(errBox) errBox.classList.add('show'); 
      if(nextBtn) { nextBtn.disabled = true; nextBtn.style.opacity = '0.4'; } 
      durationCard.style.display = 'none';
      return false; 
    }
    
    const totalDays = Math.round((e - s) / 86400000) + 1;
    const totalNights = totalDays - 1;
    
    state.days = totalDays;
    state.nights = totalNights;

    document.getElementById('computedDaysCount').textContent = totalDays;
    document.getElementById('computedNightsCount').textContent = totalNights;
    durationCard.style.display = 'flex';
  } else { 
    if(nextBtn) { nextBtn.disabled = true; nextBtn.style.opacity = '0.4'; } 
    durationCard.style.display = 'none';
    return false; 
  }
  return true;
}

            <a href="https://www.google.com/travel/flights" target="_blank" style="flex:1; font-size:11px; color:white; background:var(--ocean-mid); padding:6px; border-radius:6px; text-align:center; text-decoration:none; font-weight:600;">✈️ Search Flights</a>
            <a href="https://www.irctc.co.in" target="_blank" style="flex:1; font-size:11px; color:white; background:var(--success); padding:6px; border-radius:6px; text-align:center; text-decoration:none; font-weight:600;">🚂 Book IRCTC Rail</a>
            <a href="https://www.redbus.in" target="_blank" style="flex:1; font-size:11px; color:white; background:var(--coral); padding:6px; border-radius:6px; text-align:center; text-decoration:none; font-weight:600;">🚌 Book Bus Seats</a>
          </div>
        </div>
      `;
    }

    const elementWrapper = document.createElement('div');
    elementWrapper.innerHTML = customCardHtml;
    container.appendChild(elementWrapper.firstElementChild);
  }
}

function updateProgressBar() {
  document.getElementById('progressFill').style.width = ((currentStep / TOTAL_STEPS) * 100) + '%';
  const tabs = document.getElementById('stepTabs').children;
  for (let i = 0; i < tabs.length; i++) { tabs[i].classList.toggle('active', i === currentStep - 1); }
}

async function submitStepAndProgress(stepNum, nextStepNum, stepName) {
  const err = document.getElementById(`err${stepNum}`); if (err) err.classList.remove('show');

  if (stepNum === 1) {
    state.startCity = document.getElementById('startCity').value.trim();
    const customInputVal = document.getElementById('customDest').value.trim();
    if (customInputVal && !state.destinations.includes(customInputVal)) { state.destinations = [customInputVal]; }
    if (state.destinations.length === 0 || !state.startCity) { err.classList.add('show'); return; }
  }
  if (stepNum === 2 && !state.crew) { err.classList.add('show'); return; }
  
  if (stepNum === 3) {
    const datesAreValid = validateDatesOnly();
    if (!datesAreValid || !state.startDate || !state.endDate || !state.startTime || !state.endTime) { 
      if (err) err.classList.add('show'); 
      return; 
    }
  }
  
  if (stepNum === 4) {
    if (!state.transport || state.leg2Transport.length === 0 || !state.leg3Transport) { document.getElementById('err4').classList.add('show'); return; }
  }
  
  if (stepNum === 5) {
    state.dailyPlanData = [];
    document.querySelectorAll('.daily-card').forEach((card, idx) => {
      const placeInp = card.querySelector('.daily-place-input');
      const dateStr = placeInp.dataset.date;
      const placeVal = placeInp.value.trim();
      
      const selectEl = card.querySelector('.daily-transit-mode-select');
      const transitVal = selectEl ? selectEl.value : "Pure Travel Outbound";
      
      const thingsVal = card.querySelector('.daily-things-input') ? card.querySelector('.daily-things-input').value.trim() : "Return logistics blueprint.";
      
      let selectedVibes = [];
      const isDay1TravelOnly = document.getElementById('flagDay1TransitCb').checked;
      const isLastDayTravelOnly = document.getElementById('flagLastDayTransitCb').checked;

      if(isLastDayTravelOnly && idx === (state.days - 1)) {
        selectedVibes.push("🏡 Homeward Cruise Logistics");
      } else if (isDay1TravelOnly && idx === 0) {
        selectedVibes.push("🛫 Outbound Launch Transit");
      } else {
        card.querySelectorAll('.daily-vibe-cb:checked').forEach(cb => selectedVibes.push(cb.value));
        if(selectedVibes.length === 0) selectedVibes.push("🍛 Local Foodie");
      }

      state.dailyPlanData.push({ date: dateStr, place: placeVal, vibes: selectedVibes, thingsToDo: thingsVal, dailyTransit: transitVal });
    });
  }
  if (stepNum === 6) {
    state.budgetVal = parseInt(document.getElementById('budgetAmount').value);
    if (!state.budgetVal || !state.budgetScope) { err.classList.add('show'); return; }
  }

  const betaFeedbackText = document.getElementById('singleBetaFeedbackInput').value.trim();
  if (!betaFeedbackText) { showAppNotification("Please share your feedback below to advance parameters!"); return; }

  try {
    await travelPlannerSupabaseClient.from('journey_feedback').insert({
      step_number: stepNum, step_name: stepName, feedback_rating: 'v15_multimodal_enabled', user_comments: betaFeedbackText
    });
  } catch(e) { console.warn("Logged safely."); }

  document.getElementById('singleBetaFeedbackInput').value = '';
  
  const activePanel = document.getElementById(`step${stepNum}`);
  if(activePanel) activePanel.classList.remove('active');
  
  currentStep = nextStepNum;
  const nextPanel = document.getElementById(`step${nextStepNum}`);
  if(nextPanel) nextPanel.classList.add('active');
  updateProgressBar();
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  if (nextStepNum === 4) runGeographicalDistanceAndSpeedSuggester();
  if (nextStepNum === 5) generateDailyVibeSelectors(); 
  if (nextStepNum === 7) buildSummary();
}

function goBack(prevStep) {
  document.getElementById(`step${currentStep}`).classList.remove('active');
  currentStep = prevStep; document.getElementById(`step${prevStep}`).classList.add('active');
  updateProgressBar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function modifyItinerary() {
  document.getElementById('outputPanel').style.display = 'none';
  document.getElementById('step7').style.display = 'block';
  document.getElementById('stepTabs').style.display = 'flex';
  currentStep = 7; updateProgressBar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getDayName(dateStr) { return dateStr ? new Date(dateStr).toLocaleDateString('en-US', { weekday: 'long' }) : ''; }

function injectExploreTargetIntoItinerary(targetType, contentValue) {
  modalContextItem.type = targetType;
  modalContextItem.value = contentValue;
  
  const modalLabel = document.getElementById('injectionModalLabel');
  modalLabel.innerHTML = `Enter the day number (<strong>1 to ${state.days}</strong>) where you want to add <em>"${contentValue}"</em> to your generated itinerary layout structure:`;
  
  const dayInputField = document.getElementById('injectionDayInput');
  dayInputField.max = state.days;
  dayInputField.value = 1;
  
  document.getElementById('injectionModal').style.display = 'flex';
}

function closeInAppModal() { document.getElementById('injectionModal').style.display = 'none'; }

function confirmInAppModalInjection() {
  const targetDayVal = parseInt(document.getElementById('injectionDayInput').value);
  const parsedDayIndex = targetDayVal - 1;

  if (isNaN(parsedDayIndex) || parsedDayIndex < 0 || parsedDayIndex >= state.days) {
    alert(`Invalid day target allocation value. Drop a number between 1 and ${state.days}.`); return;
  }

  const container = document.getElementById(`injectedExploreBox-day-${parsedDayIndex}`);
  if (!container) { alert("This element card context layout can't process explicit spot item inclusions."); closeInAppModal(); return; }

  container.style.display = "block";
  if (modalContextItem.type === 'cuisine') {
    container.innerHTML = `🍲 <strong>Injected Local Culinary Goal:</strong> Explore regional food styles highlighting: <em>${modalContextItem.value}</em>.`;
  } else if (modalContextItem.type === 'famous') {
    container.innerHTML = `📸 <strong>Injected Iconic Sightseeing Check:</strong> Drop by the signature landmark target: <em>${modalContextItem.value}</em>.`;
  } else {
    container.innerHTML = `🌿 <strong>Injected Remote Trail Exploration:</strong> Venture down offbeat path tracks to discover: <em>${modalContextItem.value}</em>.`;
  }
  
  closeInAppModal();
  showAppNotification(`${modalContextItem.type.toUpperCase()} profile added to Day ${targetDayVal} cleanly inside current preview.`);
}

function buildSummary() {
  const perPersonCost = (state.budgetScope === 'Per-Person Scope') ? state.budgetVal : Math.round(state.budgetVal / state.groupSize);
  let localSummaryStr = state.leg2Transport.join(" + ");
  
  let outboundCostPerHead = (state.transport === 'Full Road Trip' || state.transport.includes('Drive')) ? Math.round((state.calculatedDistanceKM / state.leg1VehicleMileage) * state.leg1FuelPrice / state.groupSize) : state.leg1TicketCost;
  let returnCostPerHead = (state.leg3Transport === 'Drive Return' || state.leg3Transport.includes('Drive')) ? Math.round((state.calculatedDistanceKM / state.leg3VehicleMileage) * state.leg3FuelPrice / state.groupSize) : state.leg3TicketCost;
  let totalLocalCommuteCostPerHead = Math.round((state.leg2DailyCost * state.days) / state.groupSize);
  let aggregateTransitExpense = outboundCostPerHead + returnCostPerHead + totalLocalCommuteCostPerHead;

  let routePathStr = `${state.startCity} ➔ `;
  if(state.routeStyle === 'Multi-City' && state.stopoverCities.length > 0) {
     let formattedStops = state.stopoverCities.map(c => `${c.cityName} (${c.shiftTime.split(' ')[0]})`);
     routePathStr += formattedStops.join(' ➔ ') + ' ➔ ';
  }
  routePathStr += `${state.destinations[0]} ➔ Home to ${state.startCity}`;

  document.getElementById('tripSummary').innerHTML = `
    🗺️ Route Blueprint: <strong>${routePathStr}</strong><br>
    🏁 Full Loop Map Distance: <strong>~${state.calculatedDistanceKM} KM Track Mapped</strong><br>
    📅 Timeline Breakdown: <strong>${state.days} Days / ${state.nights} Nights Total</strong><br>
    ⏱️ Timing Windows: Launch Departure at <strong>${state.startTime}</strong> on Day 1 | Returning Home Cruise by <strong>${state.endTime}</strong> from ${state.homewardStartCity || state.destinations[0]}<br>
    🚗 Fleet Configuration: <strong>Launch via [${state.transport}] ➔ Roaming with [${localSummaryStr}] ➔ Cruise Return via [${state.leg3Transport}]</strong><br>
    ⛽ Consolidated Transit Expenses: <strong>₹${aggregateTransitExpense.toLocaleString('en-IN')} INR per head</strong><br>
    💰 Target Destination Budget Allocation: <strong>₹${perPersonCost.toLocaleString('en-IN')} INR Per Traveler</strong>
  `;
}

async function triggerBuiltInGeneration() {
  const statusEl = document.getElementById('apiStatusMessage');
  const outPanel = document.getElementById('outputPanel');
  
  try {
    statusEl.style.color = "green"; 
    statusEl.textContent = "Generating your bespoke adventure blueprint...";

    // 1. Force state synchronization before processing
    if (!state.dailyPlanData || state.dailyPlanData.length === 0) {
      // Emergency fallback: If data is missing, we populate with placeholders to prevent freeze
      state.dailyPlanData = Array.from({length: state.days}, (_, i) => ({
        date: state.startDate, place: state.destinations[0] || "Destination", vibes: ["🍛 Local Foodie"], thingsToDo: "Explore local spots.", dailyTransit: "Local Sightseeing"
      }));
    }

    // 2. Perform financial calculations
    let outboundCostPerHead = (state.transport === 'Full Road Trip' || state.transport.includes('Drive')) ? Math.round((state.calculatedDistanceKM / state.leg1VehicleMileage) * state.leg1FuelPrice / state.groupSize) : state.leg1TicketCost;
    let returnCostPerHead = (state.leg3Transport === 'Drive Return' || state.leg3Transport.includes('Drive')) ? Math.round((state.calculatedDistanceKM / state.leg3VehicleMileage) * state.leg3FuelPrice / state.groupSize) : state.leg3TicketCost;
    let totalLocalCommuteCostPerHead = Math.round((state.leg2DailyCost * state.days) / state.groupSize);
    let aggregateTransitExpense = outboundCostPerHead + returnCostPerHead + totalLocalCommuteCostPerHead;

    const perHeadBudget = (state.budgetScope === 'Per-Person Scope') ? state.budgetVal : Math.round(state.budgetVal / state.groupSize);
    const adjustedSpendablePool = Math.max(2000, perHeadBudget - aggregateTransitExpense);
    
    const dailyFoodBase = Math.round((adjustedSpendablePool * 0.35) / state.days); 
    const dailyTransitBase = Math.round((adjustedSpendablePool * 0.25) / state.days);
    const dailyStayBase = Math.round((adjustedSpendablePool * 0.40) / state.days);

    let htmlBody = ""; 
    let commonHubExploreItems = "";

    // 3. Render loop
    state.dailyPlanData.forEach((day, index) => {
      const matchedKey = day.place.toLowerCase().trim();
      let baseLookup = travelKnowledgeBase["default"] || { famous: ["Local Landmark"], gems: ["Hidden Gem"], breakfast: ["Local breakfast"], eats: ["Local eatery"] };
      
      // Safety lookup
      for (const key in travelKnowledgeBase) { if (matchedKey.includes(key)) { baseLookup = travelKnowledgeBase[key]; break; } }

      const primaryFamousSight = baseLookup.famous[index % baseLookup.famous.length];
      const secondaryGemSight = baseLookup.gems[(index + 1) % baseLookup.gems.length];
      const morningBreakfastVibe = baseLookup.breakfast[index % baseLookup.breakfast.length];
      const eveningCulinaryVibe = baseLookup.eats[(index + 2) % baseLookup.eats.length];

      if (index === 0) {
        commonHubExploreItems = `
          <div class="discovery-item" onclick="injectExploreTargetIntoItinerary('famous', '${primaryFamousSight}')"><span>🏛️ ${primaryFamousSight}</span> <span class="discovery-tag">Famous</span></div>
          <div class="discovery-item" onclick="injectExploreTargetIntoItinerary('offbeat', '${secondaryGemSight}')"><span>🌲 ${secondaryGemSight}</span> <span class="discovery-tag">Offbeat</span></div>
          <div class="discovery-item" onclick="injectExploreTargetIntoItinerary('cuisine', '${eveningCulinaryVibe}')"><span>🍛 ${eveningCulinaryVibe}</span> <span class="discovery-tag">Cuisine</span></div>
        `;
      }

      const isFirstDayPureTransit = (document.getElementById('flagDay1TransitCb').checked && index === 0);
      const isLastDayPureTransit = (document.getElementById('flagLastDayTransitCb').checked && index === (state.days - 1));

      htmlBody += `
        <div class="daily-card" style="border-left: 5px solid var(--coral); padding: 20px; margin-bottom: 24px; background:#fff; border-radius:16px;">
          <h3 style="color:var(--ocean-dark); font-family:'Fraunces', serif; font-size:18px; margin-bottom:10px;">☀️ Day ${index + 1} — ${day.date}</h3>
          <p style="margin-bottom:12px; font-size:14px;">📍 <strong>Base:</strong> ${day.place}</p>
          <div style="background:var(--paper); padding:12px; border-radius:10px; margin-bottom:10px;">
            <strong>Morning/Evening:</strong> ${isFirstDayPureTransit ? "Travel Day" : morningBreakfastVibe} / ${isLastDayPureTransit ? "Return Logistics" : eveningCulinaryVibe}
          </div>
          <div style="margin-top:10px; font-size:12px;">
            <div>🍲 <strong>Food:</strong> ₹${dailyFoodBase} | 🚌 <strong>Local:</strong> ₹${dailyTransitBase} | 🛌 <strong>Stay:</strong> ₹${dailyStayBase}</div>
          </div>
        </div>
      `;
    });

    // 4. Final Display Toggle
    document.getElementById('outputBody').innerHTML = htmlBody;
    document.getElementById('itineraryExploreShowcaseHub').innerHTML = commonHubExploreItems;
    document.getElementById('step7').style.display = 'none';
    document.getElementById('compulsoryFeedbackContainer').style.display = 'none';
    document.getElementById('stepTabs').style.display = 'none';
    outPanel.style.display = 'block';
    
    statusEl.textContent = "Blueprint Ready!";
    window.scrollTo({ top: 0, behavior: 'smooth' });

  } catch (error) {
    console.error("Generation Error:", error);
    statusEl.style.color = "red";
    statusEl.textContent = "Oops! We hit a glitch. Please ensure all Phase 4 transit costs are entered.";
    outPanel.style.display = 'block'; // Force open anyway
  }
}

function setupExclusiveChips(containerId, stateKey, callback) {
  document.getElementById(containerId).querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.getElementById(containerId).querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected'); state[stateKey] = chip.dataset.val;
      document.getElementById('customDest').value = "";
      if(callback) callback(chip.dataset.val);
    });
  });
}

function setupMultiSelectTransportChips(containerId, stateKey, callback) {
  document.getElementById(containerId).querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      const val = chip.dataset.val;
      if (chip.classList.contains('selected')) { 
         if(!state[stateKey].includes(val)) state[stateKey].push(val); 
      } else { 
         state[stateKey] = state[stateKey].filter(v => v !== val); 
      }
      if(callback) callback();
    });
  });
}

function setupMultiSelectChips(containerId, stateKey, callback) {
  document.getElementById(containerId).querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      const val = chip.dataset.val;
      if (chip.classList.contains('selected')) { if(!state[stateKey].includes(val)) state[stateKey].push(val); } 
      else { state[stateKey] = state[stateKey].filter(v => v !== val); }
      document.getElementById('customDest').value = "";
      if(callback) callback();
    });
  });
}

setupMultiSelectChips('destChips', 'destinations', () => { if(state.startCity) runGeographicalDistanceAndSpeedSuggester(); });
setupExclusiveChips('crewChips', 'crew', (val) => {
  const sizeField = document.getElementById('groupSizeField');
  if (['Friends', 'Family'].includes(val)) { sizeField.style.display = 'block'; state.groupSize = 4; document.getElementById('groupSize').value = 4; } 
  else { sizeField.style.display = 'none'; state.groupSize = val === 'Solo' ? 1 : 2; }
  document.getElementById('budgetInputLabel').textContent = val === 'Solo' ? 'Target Budget Allocation Amount (INR)' : 'Target Budget Allocation Amount per Person (INR)';
});

setupExclusiveChips('leg1TransportChips', 'transport', (val) => {
  runGeographicalDistanceAndSpeedSuggester();
});

setupMultiSelectTransportChips('leg2TransportChips', 'leg2Transport', () => {
  runGeographicalDistanceAndSpeedSuggester();
});

setupExclusiveChips('leg3TransportChips', 'leg3Transport', (val) => {
  runGeographicalDistanceAndSpeedSuggester();
});

setupExclusiveChips('budgetScopeChips', 'budgetScope');
</script>
