<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Travel Planner — Plan your perfect trip</title>
<link href="[https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter:wght@400;500;600&display=swap](https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter:wght@400;500;600&display=swap)" rel="stylesheet">
<style>
  :root {
    --ink: #0d1117;
    --paper: #faf8f4;
    --sand: #f0ebe1;
    --ocean: #1a3a5c;
    --ocean-dark: #0f2340;
    --ocean-mid: #2a5580;
    --coral: #e8633a;
    --coral-light: #fdf0eb;
    --gold: #c9a44a;
    --muted: #6b7280;
    --border: #e5e0d8;
    --white: #ffffff;
    --success: #2d6647;
    --success-bg: #e8f5ee;
    --warn-bg: #fef9e7;
    --warn: #92610b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  /* NAV */
  nav { background: var(--ocean-dark); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo { width: 32px; height: 32px; background: var(--coral); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .nav-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; color: var(--white); letter-spacing: -0.02em; }
  .nav-badge { background: var(--coral); color: var(--white); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; }
  .nav-powered { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 6px; }
  .nav-powered span { color: var(--gold); font-weight: 500; }

  /* HERO */
  .hero { background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--ocean) 60%, var(--ocean-mid) 100%); padding: 56px 24px 72px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(232,99,58,0.15) 0%, transparent 70%); pointer-events: none; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 16px; font-size: 12px; color: var(--gold); font-weight: 500; letter-spacing: 0.04em; margin-bottom: 20px; }
  .hero h1 { font-family: 'Fraunces', serif; font-size: clamp(28px, 5vw, 50px); font-weight: 600; color: var(--white); line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 14px; }
  .hero h1 em { font-style: italic; color: var(--coral); }
  .hero-sub { font-size: 16px; color: rgba(255,255,255,0.7); max-width: 480px; margin: 0 auto 36px; line-height: 1.6; }
  .hero-stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
  .hero-stat-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--gold); }
  .hero-stat-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* MAIN */
  .main { max-width: 780px; margin: -28px auto 60px; padding: 0 16px; position: relative; z-index: 10; }
  .card { background: var(--white); border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.1); overflow: hidden; }

  /* PROGRESS */
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--coral); transition: width 0.4s ease; }

  /* STEP TABS */
  .step-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--sand); overflow-x: auto; }
  .step-tab { flex: 1; min-width: 70px; padding: 12px 8px; text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; cursor: default; white-space: nowrap; transition: all 0.2s; user-select: none; }
  .step-tab.active { color: var(--ocean); border-bottom-color: var(--coral); background: var(--white); font-weight: 600; }
  .step-tab.done { color: var(--success); }
  .step-tab-icon { display: block; font-size: 15px; margin-bottom: 2px; }

  .step-panel { display: none; padding: 28px 24px; animation: fadeIn 0.3s ease; }

  .step-heading { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 600; color: var(--ocean-dark); margin-bottom: 4px; letter-spacing: -0.02em; }

  input[type="text"], input[type="date"], input[type="time"], input[type="number"], select, textarea {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px;

    transition: border-color 0.2s, box-shadow 0.2s; outline: none; appearance: none;

  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }

  .form-group { margin-bottom: 18px; }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; user-select: none; background: var(--white); }
  .chip:hover { border-color: var(--ocean); color: var(--ocean); background: rgba(26,58,92,0.04); }
  .chip.selected { border-color: var(--coral); color: var(--coral); background: var(--coral-light); font-weight: 600; }

  /* MOOD CARDS */
  .mood-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .mood-grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  .mood-card { padding: 14px 10px; border: 1.5px solid var(--border); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.15s; user-select: none; background: var(--white); }
  .mood-card:hover { border-color: var(--ocean); background: rgba(26,58,92,0.03); transform: translateY(-1px); }
  .mood-card.selected { border-color: var(--coral); background: var(--coral-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,99,58,0.15); }
  .mood-emoji { font-size: 22px; margin-bottom: 5px; display: block; }
  .mood-label { font-size: 12px; font-weight: 700; color: var(--ocean-dark); }
  .mood-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* DAY AVAILABILITY */
  .day-avail-grid { display: grid; gap: 8px; margin-top: 8px; }
  .day-avail-row { display: flex; align-items: center; gap: 10px; background: var(--sand); border-radius: 10px; padding: 10px 14px; }
  .day-avail-date { font-size: 12px; font-weight: 700; color: var(--ocean-dark); min-width: 90px; }
  .day-avail-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .avail-chip { padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 16px; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--white); transition: all 0.15s; }
  .avail-chip:hover { border-color: var(--ocean); }
  .avail-chip.travel { border-color: var(--coral); background: var(--coral-light); color: var(--coral); }
  .avail-chip.work { border-color: #1a56db; background: #e8f0fe; color: #1a56db; }
  .avail-chip.off { border-color: var(--muted); background: var(--sand); color: var(--muted); }

  /* VEHICLE CONFIG */
  .vehicle-box { background: var(--sand); border-radius: 12px; padding: 16px; margin-top: 12px; display: none; }
  .vehicle-box.show { display: block; }
  .vehicle-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .vehicle-label { font-size: 11px; font-weight: 700; color: var(--ocean-dark); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

  /* INFO BOX */
  .info-box { background: var(--sand); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; font-size: 13px; color: var(--ink); line-height: 1.6; }
  .info-box strong { color: var(--ocean-dark); }
  .info-highlight { background: var(--coral-light); border: 1.5px solid rgba(232,99,58,0.25); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; font-size: 13px; color: var(--ink); }

  /* TRAVEL TIME BADGE */
  .travel-time-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--ocean-dark); color: var(--white); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; margin-top: 10px; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; margin-top: 24px; align-items: center; }
  .btn { padding: 11px 22px; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--coral); color: var(--white); flex: 1; justify-content: center; }
  .btn-primary:hover { background: #d4562f; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,99,58,0.35); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); padding: 11px 18px; }
