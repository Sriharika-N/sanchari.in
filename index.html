<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Travel Planner — Let's Explore!</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #0d1117; --paper: #faf8f4; --sand: #f0ebe1; --ocean: #1a3a5c;
    --ocean-dark: #0f2340; --ocean-mid: #2a5580; --coral: #e8633a;
    --coral-light: #fdf0eb; --gold: #c9a44a; --muted: #6b7280; --border: #e5e0d8; --white: #ffffff;
    --success: #2d6647; --success-bg: #e8f5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; position: relative; }
  nav { background: var(--ocean-dark); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight:600; font-family: 'Fraunces', serif; }
  .main { max-width: 780px; margin: 40px auto; padding: 0 16px; }
  .card { background: var(--white); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid var(--border); }
  .progress-bar { height: 4px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--coral); transition: width 0.4s ease; width: 14%; }
  .step-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--sand); overflow-x: auto; }
  .step-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 11px; font-weight: 500; color: var(--muted); cursor: default; white-space: nowrap; }
  .step-tab.active { color: var(--ocean); background: var(--white); font-weight: 600; border-bottom: 2px solid var(--coral); }
  .step-panel { display: none; padding: 28px 24px; }
  .step-panel.active { display: block; }
  .step-heading { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--ocean-dark); margin-bottom: 4px; }
  .step-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ocean-dark); margin-bottom: 5px; text-transform: uppercase; }
  input[type="text"], input[type="date"], input[type="number"], input[type="email"], input[type="password"], select, textarea {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: white;
  }
  .form-group { margin-bottom: 18px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; background: white; }
  .chip.selected { border-color: var(--coral); color: var(--coral); background: var(--coral-light); font-weight: 600; }
  .compulsory-feedback-card { background: var(--coral-light); border: 1.5px solid var(--coral); border-radius: 14px; padding: 16px; margin: 20px 24px 24px; }
  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn { padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
  .btn-primary { background: var(--coral); color: white; flex: 1; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .error-box { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 10px; padding: 12px 16px; margin-top: 14px; display: none; font-size: 13px; color: #991b1b; }
  .error-box.show { display: block; }
  .daily-card { background: var(--white); border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 16px; }
  .vibe-checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
  .vibe-checkbox-label { font-size: 13px; display: flex; align-items: center; gap: 4px; background: var(--paper); padding: 4px 10px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
  .injection-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 35, 64, 0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 3000; }
  .injection-modal-container { background: var(--white); border-radius: 16px; padding: 24px; width: 90%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid var(--border); }
</style>
</head>
<body>

<div id="injectionModal" class="injection-modal-overlay">
  <div class="injection-modal-container">
    <h3 style="font-family:'Fraunces', serif; color:var(--ocean-dark); font-size:18px; margin-bottom:8px;">Add Spotlight Item</h3>
    <p id="injectionModalLabel" style="font-size:13.5px; color:var(--muted); margin-bottom:16px;"></p>
    <div class="form-group">
      <label>Target Trip Day Number:</label>
      <input type="number" id="injectionDayInput" min="1" step="1" value="1" style="font-weight: 600;">
    </div>
    <div class="btn-row" style="margin-top: 16px;">
      <button class="btn btn-ghost" onclick="closeInAppModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmInAppModalInjection()" style="background: var(--ocean-mid);">Confirm Addition</button>
    </div>
  </div>
</div>

<nav>
  <a class="nav-brand" href="#">✈️ AI Travel Planner</a>
  <button id="authHeaderBtn" class="btn" style="background: var(--coral); color: white; padding: 6px 16px; font-size: 13px;" onclick="openAuthModal()">🔑 Account Access</button>
</nav>

<div class="main">
  <div class="card">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="step-tabs" id="stepTabs">
      <div class="step-tab active">🗺️ Dest</div>
      <div class="step-tab">👥 Crew</div>
      <div class="step-tab">📅 Dates</div>
      <div class="step-tab">🚗 Transit</div>
      <div class="step-tab">✨ Vibes</div>
      <div class="step-tab">💰 Budget</div>
      <div class="step-tab">🚀 Review</div>
    </div>

    <!-- STEP 1: DESTINATIONS -->
    <div class="step-panel active" id="step1">
      <div class="step-heading">Where are we exploring? 🗺️</div>
      <div class="form-group">
        <label>Or enter custom location</label>
        <input type="text" id="customDest" placeholder="e.g. Udaipur...">
      </div>
      <div class="form-group">
        <label>Starting Location</label>
        <input type="text" id="startCity" placeholder="e.g. Bangalore">
      </div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(1, 2, 'Destinations')">Next — Companion Crew →</button>
      <div class="error-box" id="err1">Please fill in your locations.</div>
    </div>

    <!-- STEP 2: CREW -->
    <div class="step-panel" id="step2">
      <div class="step-heading">Who is traveling? 👥</div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(2, 3, 'Crew')">Next — Pick Dates →</button>
    </div>

    <!-- STEP 3: DATES -->
    <div class="step-panel" id="step3">
      <div class="step-heading">When is the adventure? 📅</div>
      <div class="form-group"><label>Start Date</label><input type="date" id="startDate"></div>
      <div class="form-group"><label>Return Date</label><input type="date" id="endDate"></div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(3, 4, 'Dates')">Next — Transit Settings →</button>
    </div>

    <!-- STEP 4: TRANSIT -->
    <div class="step-panel" id="step4">
      <div class="step-heading">Transit Settings 🚗</div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(4, 5, 'Transit')">Next — Daily Vibes →</button>
    </div>

    <!-- STEP 5: VIBES -->
    <div class="step-panel" id="step5">
      <div class="step-heading">Daily Customization Matrix ✨</div>
      <div id="dailyVibeContainer"></div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(5, 6, 'Vibes')">Next — Budget →</button>
    </div>

    <!-- STEP 6: BUDGET -->
    <div class="step-panel" id="step6">
      <div class="step-heading">Financial Parameters 💰</div>
      <button class="btn btn-primary" onclick="submitStepAndProgress(6, 7, 'Budget')">Next — Review →</button>
    </div>

    <!-- STEP 7: REVIEW -->
    <div class="step-panel" id="step7">
      <div class="step-heading">Adventure is calling! 🎒</div>
      
      <!-- COMPULSORY FEEDBACK PORTAL -->
      <div class="compulsory-feedback-card" id="compulsoryFeedbackContainer">
        <label>📋 Beta Tester Portal Review</label>
        <textarea id="singleBetaFeedbackInput" placeholder="How does the app feel, and what else should this page show?..." style="width:100%;"></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="triggerBuiltInGeneration()">🚀 Generate My Optimized Route Plan</button>
    </div>

    <div id="outputPanel" style="display:none; padding: 24px;"></div>
  </div>
</div>

<script>
// Essential Globals
let state = { destinations: [], startCity: '', days: 0, startDate: '', endDate: '', dailyPlanData: [] };
let currentStep = 1;

function submitStepAndProgress(stepNum, nextStepNum, stepName) {
  // Logic to handle navigation
  const err = document.getElementById(`err${stepNum}`);
  if(err) err.classList.remove('show');
  
  // Update state logic here...
  
  document.getElementById(`step${stepNum}`).classList.remove('active');
  currentStep = nextStepNum;
  document.getElementById(`step${nextStepNum}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function triggerBuiltInGeneration() {
  // Final rendering logic that includes the feedback
  const feedback = document.getElementById('singleBetaFeedbackInput').value;
  if (!feedback) { alert("Please provide feedback first!"); return; }
  // Proceed with generation
}

function closeInAppModal() { document.getElementById('injectionModal').style.display = 'none'; }
</script>
</body>
</html>
