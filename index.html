<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Travel Planner — Let's Explore!</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #0d1117; --paper: #faf8f4; --sand: #f0ebe1; --ocean: #1a3a5c;
    --ocean-dark: #0f2340; --ocean-mid: #2a5580; --coral: #e8633a;
    --coral-light: #fdf0eb; --gold: #c9a44a; --muted: #6b7280; --border: #e5e0d8; --white: #ffffff;
    --success: #2d6647; --success-bg: #e8f5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; }
  .main { max-width: 780px; margin: 40px auto; padding: 0 16px; }
  .card { background: var(--white); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); padding: 28px; border: 1px solid var(--border); }
  .step-heading { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ocean-dark); margin-bottom: 20px; }
  input, select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 15px; }
  .autocomplete-results { position: absolute; background: white; border: 1px solid var(--border); border-radius: 10px; width: 95%; z-index: 100; max-height: 200px; overflow-y: auto; }
  .autocomplete-item { padding: 10px; cursor: pointer; }
  .autocomplete-item:hover { background: var(--coral-light); }
  .chip { display: inline-block; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; margin-right: 8px; cursor: pointer; font-size: 13px; }
  .chip.selected { border-color: var(--coral); background: var(--coral-light); color: var(--coral); }
  .stopover-card-block { background: var(--paper); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
  .btn { padding: 12px 20px; border-radius: 10px; border: none; background: var(--coral); color: white; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="main">
  <div class="card">
    <div class="step-heading">Where are we exploring? 🗺️</div>
    <div class="form-group" style="position: relative;">
      <label>Destination City:</label>
      <input type="text" id="liveSearchInput" placeholder="Search for any city..." oninput="handleLiveSearch()">
      <div id="liveSearchResults" class="autocomplete-results"></div>
    </div>
    
    <div class="step-heading" style="margin-top:30px;">Transit & Travel 🚗</div>
    <!-- Leg 1 -->
    <label>Leg 1: Launch</label>
    <div class="chips" id="leg1TransportChips">
      <div class="chip" data-val="Flight">✈️ Flying</div>
      <div class="chip" data-val="Train">🚂 Train</div>
      <div class="chip" data-val="Road">🚗 Driving</div>
    </div>
    <div id="leg1CostWrap" style="display:none; margin-top:10px;">
      <input type="number" id="leg1Cost" placeholder="Enter Fare/Fuel Cost (INR)" onchange="calculateSummary()">
    </div>

    <!-- Multi-City Pace -->
    <div class="step-heading" style="margin-top:30px;">Choose Your Pace 🏎️</div>
    <div class="chips" id="routePaceChips">
      <div class="chip selected" data-val="Single" onclick="toggleRouteStyle('Single')">🛋️ One Hub</div>
      <div class="chip" data-val="Multi" onclick="toggleRouteStyle('Multi')">🚀 Multi-City Road Trip</div>
    </div>
    <div id="multiCityPanel" style="display:none; margin-top:15px;">
      <div id="stopoverRows"></div>
      <button class="btn btn-ghost" onclick="addNewStopover()">+ Add Stopover</button>
    </div>

    <div id="summaryBox" style="margin-top:30px; padding:20px; background:var(--sand); border-radius:15px; display:none;"></div>
  </div>
</div>

<script>
let state = { transport: '', routeStyle: 'Single', stopoverCities: [], distance: 450 };

async function handleLiveSearch() {
  const query = document.getElementById('liveSearchInput').value;
  if (query.length < 3) return;
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
  const data = await res.json();
  const resDiv = document.getElementById('liveSearchResults');
  resDiv.innerHTML = '';
  data.slice(0, 5).forEach(item => {
    const div = document.createElement('div');
    div.className = 'autocomplete-item';
    div.textContent = item.display_name;
    div.onclick = () => {
      document.getElementById('liveSearchInput').value = item.display_name;
      resDiv.innerHTML = '';
    };
    resDiv.appendChild(div);
  });
}

function toggleRouteStyle(style) {
  state.routeStyle = style;
  document.querySelectorAll('#routePaceChips .chip').forEach(c => c.classList.toggle('selected', c.dataset.val === style));
  document.getElementById('multiCityPanel').style.display = style === 'Multi' ? 'block' : 'none';
  calculateSummary();
}

function addNewStopover() {
  const container = document.getElementById('stopoverRows');
  const div = document.createElement('div');
  div.className = 'stopover-card-block';
  div.innerHTML = `
    <input type="text" placeholder="Stopover City" class="stopover-input" onchange="calculateSummary()">
    <input type="number" placeholder="Est. Fare/Fuel" class="stopover-cost" onchange="calculateSummary()">
  `;
  container.appendChild(div);
}

function calculateSummary() {
  const box = document.getElementById('summaryBox');
  box.style.display = 'block';
  const leg1Cost = document.getElementById('leg1Cost').value || 0;
  box.innerHTML = `<strong>Total Estimated Transit:</strong> ₹${leg1Cost} (Updates live as you add stops)`;
}

document.querySelectorAll('#leg1TransportChips .chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('#leg1TransportChips .chip').forEach(c => c.classList.remove('selected'));
    chip.classList.add('selected');
    state.transport = chip.dataset.val;
    document.getElementById('leg1CostWrap').style.display = 'block';
    calculateSummary();
  };
});
</script>
</body>
</html>
